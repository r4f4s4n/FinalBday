<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Bday</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .btn-start {
            font-family: 'Press Start 2P', cursive;
            padding: 20px 40px;
            background: #ffcc00;
            border: 6px solid #000;
            box-shadow: 8px 8px 0px #8B0000;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            font-size: 24px;
            transition: 0.2s;
        }
        .btn-start:hover { transform: scale(1.1); background: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="video_movil.mp4" media="(max-width: 768px)">
            <source src="video_escritorio.mp4" media="(min-width: 769px)">
        </video>
        <div class="overlay">
            <a href="app_principal.html" class="btn-start">START</a>
        </div>
    </div>
</body>
</html>
